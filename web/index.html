  <!-- Favicon preferido: PNG versionado (evita caché antiguo) - usar la pesa sin fondo -->
  <link rel="icon" type="image/png" href="assets/logo%20sin%20fondo%20CanaryCoach.png?v=2" />
  <link rel="apple-touch-icon" href="assets/logo%20sin%20fondo%20CanaryCoach.png?v=2" />
  <!-- Fallback ICO (con versión para forzar recarga) -->
  <link rel="icon" type="image/x-icon" href="logoapp48.png.ico?v=2" />
  <link rel="shortcut icon" href="logoapp48.png.ico?v=2" />

  <!-- Script: generar favicon redondeado a partir del logo (evita editar binarios) -->
  <script>
    (function(){
      const preferred = 'assets/logo%20sin%20fondo%20CanaryCoach.png?v=2';
      function setRoundedFavicon(src){
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function(){
          const size = 64;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const r = Math.round(size * 0.18);
          ctx.clearRect(0,0,size,size);
          ctx.beginPath();
          ctx.moveTo(r,0);
          ctx.arcTo(size,0,size,size,r);
          ctx.arcTo(size,size,0,size,r);
          ctx.arcTo(0,size,0,0,r);
          ctx.arcTo(0,0,size,0,r);
          ctx.closePath();
          ctx.clip();
          // scale cover
          const scale = Math.max(size / img.width, size / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          const x = (size - w) / 2;
          const y = (size - h) / 2;
          ctx.drawImage(img, x, y, w, h);
          const dataURL = canvas.toDataURL('image/png');
          function updateRel(rel){
            let link = document.querySelector("link[rel='"+rel+"']");
            if(!link){
              link = document.createElement('link');
              link.rel = rel;
              document.head.appendChild(link);
            }
            link.href = dataURL;
          }
          updateRel('icon');
          updateRel('shortcut icon');
          updateRel('apple-touch-icon');
        };
        img.onerror = function(){ /* fallback: dejar ico actual */ };
        img.src = src;
      }
      // Intentar con el asset transparente; si falla, no sustituir
      setRoundedFavicon(preferred);
    })();
  </script>

  <title>CanaryCoach</title>
  <link rel="manifest" href="manifest.json">
